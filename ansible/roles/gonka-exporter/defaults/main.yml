exporter_image: "ghcr.io/inc4/gonka-exporter-go"
exporter_version: "latest"
exporter_port: 9404
exporter_refresh_interval: 30
max_epoch_history: 500
participant_address: ""
node_alias: "gonka-node"

# Internal API URLs (container names on the Docker bridge network)
node_rpc_url: "http://node:26657"
node_rest_url: "http://node:1317"
api_url: "http://api:9000"
admin_api_url: "http://api:9200"

# Comma-separated list of public nodes for max block height comparison (empty = built-in defaults)
block_height_nodes: ""

# Docker network of the Gonka node stack (exporter joins this to reach node/api containers)
gonka_network: "gonka-node_default"

# Node-exporter (system metrics)
node_exporter_image: "prom/node-exporter:latest"
node_exporter_port: 9101
